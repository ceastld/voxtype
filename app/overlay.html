<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxType Overlay</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .pill {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(20, 22, 30, 0.88);
        border: 1px solid rgba(79, 140, 255, 0.5);
        color: #e8eaed;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #f28b82;
        animation: pulse 1s ease-in-out infinite;
      }
      .dot.idle { background: #9aa0a6; animation: none; }
      .dot.transcribing { background: #fdd663; }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.35); opacity: 0.65; }
      }
      #label { font-size: 13px; white-space: nowrap; }
    </style>
  </head>
  <body>
    <div class="pill">
      <div id="dot" class="dot idle"></div>
      <span id="label">VoxType</span>
    </div>
    <script type="module">
      import { listen } from "@tauri-apps/api/event";
      const dot = document.getElementById("dot");
      const label = document.getElementById("label");
      listen("overlay-phase", (ev) => {
        const phase = ev.payload;
        dot.className = "dot";
        if (phase === "recording") {
          label.textContent = "正在听…";
        } else if (phase === "transcribing") {
          dot.classList.add("transcribing");
          label.textContent = "识别中…";
        } else {
          dot.classList.add("idle");
          label.textContent = "VoxType";
        }
      });
    </script>
  </body>
</html>
